<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasker</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body class="page">
    <header class="header">
      <div class="mobile-corner">
        <i class="fas fa-bars"></i>
        <span>Joe Bloggs</span>
      </div>
      <div class="header__right">
        <nav class="nav">
          <div class="search nav-block">
            <i class="fas fa-magnifying-glass search__icon"></i>
            <input type="search" placeholder="Search" class="search__input" />
          </div>
        </nav>
        <button class="filter-button nav-block">
          <p class="filter-button__text">Status</p>
          <i class="fas fa-chevron-down"></i>
        </button>
        <button class="new-task-button nav-block">
          <p class="new-task-button__text">New Task</p>
          <i class="fas fa-plus"></i>
        </button>
      </div>
    </header>

    <aside class="sidebar">
      <div class="user-info">
        <div class="user-info__icon">
          <i class="fas fa-user"></i>
        </div>
        <div class="user-info__text">
          <p>Joe Bloggs</p>
          <p class="user-info__position">CEO</p>
        </div>
      </div>

      <div class="sidebar__links">
        <a href="index.html" class="sidebar__link">
          <i class="fas fa-arrow-trend-up"></i>
          Dashboard
        </a>
        <a href="#" class="sidebar__link sidebar__link--chosen">
          <i class="fas fa-clipboard"></i>
          Tasks
        </a>
        <a href="#" class="sidebar__link">
          <i class="fas fa-note-sticky"></i>
          Board
        </a>
        <a href="#" class="sidebar__link">
          <i class="fas fa-square-plus"></i>
          Create Task
        </a>
        <a href="#" class="sidebar__link">
          <i class="fas fa-gear"></i>
          Settings
        </a>
      </div>
    </aside>
  </body>
</html>
