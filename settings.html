<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasker</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body class="page page--padded">
    <header class="header">
      <div class="header__left">
        <div class="mobile-corner">
          <i class="fas fa-bars"></i>
          <p class="mobile-corner__name nowrap">Joe Bloggs</p>
        </div>
      </div>
      <div class="header__right">
        <button class="back-button">
          <a href="javascript:history.back()" class="back-button__link">
            <div class="back-button__icon back-button__big-icon">
              <i class="fas fa-arrow-left-long fa-lg"></i>
            </div>
            <div class="back-button__icon back-button__small-icon">
              <i class="fas fa-arrow-left-long fa-sm"></i>
            </div>
            <p class="back-button__text">Back</p>
          </a>
        </button>
      </div>
    </header>
  </body>
</html>
