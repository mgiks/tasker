<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasker</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body class="page page--padded">
    <header class="header">
      <div class="header__left">
        <div class="mobile-corner">
          <i class="fas fa-bars"></i>
          <p class="mobile-corner__name nowrap">Joe Bloggs</p>
        </div>
      </div>
      <div class="header__right">
        <button class="back-button">
          <a href="javascript:history.back()" class="back-button__link">
            <div class="back-button__icon back-button__big-icon">
              <i class="fas fa-arrow-left-long fa-lg"></i>
            </div>
            <div class="back-button__icon back-button__small-icon">
              <i class="fas fa-arrow-left-long fa-sm"></i>
            </div>
            <p class="back-button__text">Back</p>
          </a>
        </button>
      </div>
    </header>

    <aside class="sidebar">
      <div class="user-info">
        <div class="user-info__icon">
          <i class="fas fa-user"></i>
        </div>
        <div class="user-info__text">
          <p class="user-info__name">Joe Bloggs</p>
          <p class="user-info__job-title">CEO</p>
        </div>
      </div>

      <nav class="sidebar__links">
        <a href="index.html" class="sidebar__link">
          <i class="fas fa-arrow-trend-up"></i>
          Dashboard
        </a>
        <a href="tasks.html" class="sidebar__link">
          <i class="fas fa-clipboard"></i>
          Tasks
        </a>
        <a href="board.html" class="sidebar__link">
          <i class="fas fa-note-sticky"></i>
          Board
        </a>
        <a href="create-task.html" class="sidebar__link">
          <i class="fas fa-square-plus"></i>
          Create Task
        </a>
        <a href="#" class="sidebar__link sidebar__link--chosen">
          <i class="fas fa-gear"></i>
          Settings
        </a>
      </nav>
    </aside>

    <main class="main">
      <h1 class="h1 main__title">Settings</h1>
      <section class="settings">
        <div class="settings-sections">
          <section class="settings-section">
            <h2 class="h2 settings-section__name">Appearance</h2>

            <div class="block settings-section__options">
              <div class="setting">
                <p class="setting__name">Theme</p>
                <div class="setting__setter">
                  <select class="selector settings__selector">
                    <option selected class="selector__item">Dark</option>
                    <option class="selector__item">Light</option>
                  </select>
                </div>
              </div>
              <div class="setting">
                <p class="setting__name">Compact mode</p>
                <div class="settings-toggle">
                  <input type="checkbox" class="settings-toggle__checkbox" />
                </div>
              </div>
              <div class="setting">
                <p class="setting__name">Accent color</p>
                <div class="setting__setter">
                  <select class="selector settings__selector">
                    <option selected class="selector__item">Red</option>
                    <option class="selector__item">Blue</option>
                    <option class="selector__item">Green</option>
                  </select>
                </div>
              </div>
            </div>
          </section>

          <section class="settings-section">
            <h2 class="h2 settings-section__name">Notifications</h2>

            <div class="block settings-section__options">
              <div class="setting">
                <p class="setting__name">Email notifications</p>
                <div class="settings-toggle">
                  <input type="checkbox" class="settings-toggle__checkbox" />
                </div>
              </div>
              <div class="setting">
                <p class="setting__name">Weekly reports</p>
                <div class="settings-toggle">
                  <input type="checkbox" class="settings-toggle__checkbox" />
                </div>
              </div>
            </div>
          </section>

          <section class="settings-section">
            <h2 class="h2 settings-section__name">Account</h2>

            <div class="block settings-section__options">
              <div class="setting">
                <p class="setting__name">Name</p>
                <div class="setting__setter">
                  <p>Joe Blogs</p>
                  <div class="pen-icon">
                    <i class="fas fa-pen fa-xs"></i>
                  </div>
                </div>
              </div>
              <div class="setting">
                <p class="setting__name">Email</p>
                <div class="setting__setter">
                  <p>example@mail.com</p>
                  <div class="pen-icon">
                    <i class="fas fa-pen fa-xs"></i>
                  </div>
                </div>
              </div>
              <button class="settings__button">Change password</button>
            </div>
          </section>

          <section class="settings-section">
            <h2 class="h2 settings-section__name">Danger zone</h2>
            <div class="block settings-section__options">
              <button class="settings__button">Delete account</button>
            </div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
