<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasker</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body class="page page--padded">

      <div class="header__left">

        </div>

      <div class="header__right">
        <button class="back-button">
          <a href="javascript:history.back()" class="back-button__link">
            <div class="back-button__icon back-button__big-icon">
              <i class="fas fa-arrow-left-long fa-lg"></i>

            <div class="back-button__icon back-button__small-icon">

          <p class="user-info__name">Joe Bloggs</p>

      <nav class="sidebar__links">
        <a href="index.html" class="sidebar__link">

        </a>
        <a href="board.html" class="sidebar__link">
          <i class="fas fa-note-sticky"></i>

        <a href="create-task.html" class="sidebar__link" ">

        </a>
        <a href="#" class="sidebar__link  sidebar__link--chosen">
          <i class="fas fa-gear"></i>

        </a>
