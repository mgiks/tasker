<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasker</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body class="page">
    <header class="header">
      <div>
        <i class="fas fa-bars"></i>
        <span>Username</span>
      </div>
      <nav>
        <div class="search">
          <i class="fas fa-magnifying-glass"></i>
          <input type="search" placeholder="Search" class="search__input" />
        </div>
      </nav>
    </header>

    <main class="main">
      <div class="main__section info-cards">
        <article class="info-card">
          <h4>Tasks Done</h4>
          <p>1337</p>
          <p>+13% this week</p>
        </article>
        <article class="info-card">
          <h4>Active Users</h4>
          <p>505</p>
          <p>+30 today</p>
        </article>
        <article class="info-card">
          <h4>Revenue</h4>
          <p>$4,397</p>
          <p>+4% since last month</p>
        </article>
      </div>

      <div class="main__section graph">
        <h4>Task Completion</h4>
        <img
          src="graph.png"
          alt="graph"
          width="800"
          height="681"
          class="graph__image"
        />
      </div>
    </main>
  </body>
</html>
